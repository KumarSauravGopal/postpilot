<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D8CFF"/>
      <stop offset="100%" style="stop-color:#00C2CB"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Letter P -->
  <text
    x="100"
    y="360"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
    font-size="320"
    font-weight="800"
    fill="white"
    opacity="1"
    letter-spacing="-20"
  >PP</text>

  <!-- Subtle pulse ring -->
  <circle cx="390" cy="130" r="48" fill="none" stroke="white" stroke-width="6" opacity="0.25"/>
  <circle cx="390" cy="130" r="28" fill="white" opacity="0.9"/>
  <!-- Lightning bolt inside dot -->
  <path d="M396 118 L386 132 L393 132 L384 144 L400 128 L393 128 Z" fill="#2D8CFF"/>
</svg>
